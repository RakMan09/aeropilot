name: AeroPilot CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            qemu-system-arm \
            cppcheck \
            cmake \
            python3-matplotlib

      - name: Static analysis (cppcheck must be clean)
        run: |
          cppcheck --enable=warning,performance,portability --std=c11 \
            --error-exitcode=2 --suppress=missingInclude --inline-suppr \
            -I src src

      - name: Build + run host unit tests
        run: |
          cmake -B build-host -DAEROPILOT_BUILD=host_tests
          cmake --build build-host
          ctest --test-dir build-host --output-on-failure

      - name: Measure core coverage (gcov, fail under 90%)
        run: |
          pip3 install --user gcovr
          cmake -B build-cov -DAEROPILOT_BUILD=host_tests \
            -DAEROPILOT_COVERAGE=ON -DCMAKE_C_COMPILER=gcc
          cmake --build build-cov
          ctest --test-dir build-cov
          ~/.local/bin/gcovr --root . --filter 'src/' \
            --exclude 'src/app/' --exclude 'src/tasks/' \
            --fail-under-line 90 --print-summary

      - name: Build firmware
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DAEROPILOT_BUILD=firmware
          cmake --build build

      - name: Run simulated flight on QEMU + decode telemetry
        run: |
          timeout 120 qemu-system-arm -M mps2-an385 -cpu cortex-m3 \
            -kernel build/aeropilot.elf -display none -monitor none \
            -serial stdio -serial file:telemetry.bin -semihosting \
            | tee flight.log
          grep -q "FLIGHT COMPLETE" flight.log
          python3 groundstation/decode.py --file telemetry.bin \
            --plot flight.png --check

      - name: Build + run watchdog fault-injection flight
        run: |
          cmake -B build-hang -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DAEROPILOT_BUILD=firmware -DAEROPILOT_INJECT_HANG=1.5
          cmake --build build-hang
          timeout 60 qemu-system-arm -M mps2-an385 -cpu cortex-m3 \
            -kernel build-hang/aeropilot.elf -display none -monitor none \
            -serial stdio -serial file:telemetry_hang.bin -semihosting \
            | tee hang.log
          grep -q "SAFE STATE ENTERED" hang.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aeropilot-artifacts
          path: |
            flight.log
            flight.png
            telemetry.bin
          if-no-files-found: ignore
